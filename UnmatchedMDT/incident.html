<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Details - Unmatched ePCR System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="uhs.png" alt="Trust Logo" onerror="this.style.display='none'">
                <h1>Unmatched ePCR System</h1>
            </div>
            <ul class="nav-links">
                <li class="nav-item"><a href="index.html">🩺 Medic Grade</a></li>
                <li class="nav-item active"><a href="incident.html">📋 Incident</a></li>
                <li class="nav-item"><a href="injury.html">🩹 Injury</a></li>
                <li class="nav-item"><a href="treatment.html">💊 Treatment</a></li>
                <li class="nav-item"><a href="export.html">📤 Export</a></li>
                <li class="nav-item"><a href="https://notwasooked.github.io" target="_blank" rel="noopener noreferrer">🧰 View More Tools ↗</a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="theme-toggle-btn" onclick="toggleTheme()">
                    <span id="themeLabel">🌙 Dark Mode</span>
                </button>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="dashboard-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
                    <div class="dash-title-group"><h2>Unmatched Health Service</h2></div>
                </div>
                <div class="dash-meta">
                    <div class="meta-pill"><span id="dashClock">--:--:--</span></div>
                </div>
            </header>

            <div class="content-container">
                <form id="epcrForm" oninput="saveLocalData()">
                    <div class="fluent-card">
                        <div class="card-header"><h3>📋 Incident Details</h3></div>
                        <div class="card-body">
                            <div class="grid-2">
                                <div class="form-group">
                                    <label>Unit / Call Sign</label>
                                    <input type="text" id="callsign" placeholder="e.g. Medic 1">
                                </div>
                                <div class="form-group">
                                    <label>Date & Time</label>
                                    <input type="datetime-local" id="date">
                                </div>
                            </div>
                            <div class="grid-2" style="margin-top: 12px;">
                                <div class="form-group hems-doc-only">
                                    <label>Deployment Method</label>
                                    <select id="deployMethod">
                                        <option value="HEMS">HEMS (Helicopter)</option>
                                        <option value="RRV">RRV (Car)</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Attendance Method</label>
                                    <select id="attendance">
                                        <option value="Attended Scene">Attended Scene</option>
                                        <option value="Self Presented">Self Presented</option>
                                    </select>
                                </div>
                            </div>

                            <div style="display: flex; justify-content: space-between; margin-top: 24px;">
                                <a href="index.html" class="btn btn-outline">← Back</a>
                                <a href="injury.html" class="btn btn-primary">Next: Injury →</a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
